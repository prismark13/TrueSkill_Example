<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Intelligence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Public Sans', sans-serif; background: #FFF; color: #111; margin: 0; display: flex; justify-content: center; }
        .container { max-width: 1100px; width: 90%; padding: 80px 0; }
        
        /* Sidebar-style Header */
        .controls { position: fixed; left: 40px; top: 40px; }
        select { background: #001E3C; color: white; border: none; padding: 10px 20px; font-weight: 600; cursor: pointer; border-radius: 4px; }

        .hero { margin-bottom: 80px; }
        #display-year { font-size: 8rem; font-weight: 700; color: #001E3C; letter-spacing: -0.4rem; line-height: 0.8; margin: 0; }
        .label { font-size: 1rem; color: #00558C; text-transform: uppercase; letter-spacing: 0.4rem; font-weight: 600; margin-top: 20px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .section-title { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.2rem; color: #00558C; border-bottom: 2px solid #F4F7F9; padding-bottom: 15px; margin-bottom: 25px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.65rem; color: #A5AAB0; text-transform: uppercase; padding: 10px 0; border-bottom: 1px solid #EEE; }
        td { padding: 16px 0; font-size: 0.95rem; border-bottom: 1px solid #F9FAFB; }
        .rank { width: 40px; font-weight: 700; color: #00558C; }
        .val { text-align: right; font-weight: 700; color: #001E3C; }
        .sessions { text-align: right; color: #8E959E; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div class="controls">
        <select id="year-select" onchange="updateDashboard()">
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2018">2018</option>
        </select>
    </div>

    <div class="container">
        <div class="hero">
            <h1 id="display-year">2026</h1>
            <div class="label">Performance Analysis</div>
        </div>

        <div class="grid">
            <div id="players-section">
                <div class="section-title">Individuals</div>
                <table id="player-table"><thead><tr><th class="rank">#</th><th>Name</th><th style="text-align:right">Rating</th><th style="text-align:right">Sessions</th></tr></thead><tbody></tbody></table>
            </div>
            <div id="pairs-section">
                <div class="section-title">Partnerships</div>
                <table id="pair-table"><thead><tr><th class="rank">#</th><th>Pair</th><th style="text-align:right">Score</th><th style="text-align:right">Sessions</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </div>

    <script>
        let masterData = {};

        async function init() {
            const response = await fetch('data.json');
            masterData = await response.json();
            updateDashboard();
        }

        function updateDashboard() {
            const year = document.getElementById('year-select').value;
            document.getElementById('display-year').innerText = year;
            const data = masterData[year];

            renderTable('player-table', data.players, 'name', 'rating', 'sessions');
            renderTable('pair-table', data.pairs, 'pair', 'score', 'sessions', true);
        }

        function renderTable(tableId, rows, nameKey, valKey, sessionKey, isPct=false) {
            const tbody = document.querySelector(`#${tableId} tbody`);
            tbody.innerHTML = rows.map((row, i) => `
                <tr>
                    <td class="rank">${i+1}</td>
                    <td>${row[nameKey]}</td>
                    <td class="val">${isPct ? row[valKey].toFixed(1) + '%' : row[valKey].toFixed(2)}</td>
                    <td class="sessions">${row[sessionKey]}</td>
                </tr>
            `).join('');
        }

        init();
    </script>
</body>
</html>
