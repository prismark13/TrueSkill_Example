<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honors Bridge | Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #002d72; --slate-50: #f8fafc; --slate-100: #f1f5f9;
            --slate-200: #e2e8f0; --slate-400: #94a3b8; --blue-text: #1e40af; 
            --gold: #fbbf24; --up: #059669; --down: #dc2626;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; padding: 60px 40px; }
        .container { max-width: 1100px; margin: auto; }

        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; border-bottom: 1px solid var(--slate-200); padding-bottom: 40px; }
        .branding h1 { font-family: 'Instrument Serif', serif; font-size: 84px; color: var(--navy); line-height: 0.8; }
        .branding h1 span { font-style: italic; font-weight: 300; color: var(--slate-200); }
        .club-tag { font-size: 11px; font-weight: 800; letter-spacing: 5px; color: var(--blue-text); text-transform: uppercase; margin-bottom: 20px; display: block; }
        
        .nav { display: flex; gap: 30px; }
        .nav-btn { background: none; border: none; font-family: inherit; font-weight: 700; font-size: 15px; color: var(--slate-400); cursor: pointer; padding: 10px 0; border-bottom: 2px solid transparent; transition: 0.3s; }
        .nav-btn.active { color: var(--navy); border-bottom-color: var(--navy); }

        /* Summary Stats */
        .club-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 60px; }
        .stat-card { background: var(--slate-50); padding: 30px; border-radius: 24px; border: 1px solid var(--slate-100); }
        .stat-card label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--slate-400); letter-spacing: 2px; display: block; margin-bottom: 10px; }
        .stat-card .val { font-size: 32px; font-weight: 900; color: var(--navy); }
        .stat-card .sub { font-size: 13px; font-weight: 600; color: var(--blue-text); margin-top: 5px; }

        /* Table */
        .list-header { display: grid; grid-template-columns: 60px 1fr 120px 100px; padding: 0 30px 15px 30px; font-size: 11px; font-weight: 800; color: var(--slate-400); text-transform: uppercase; border-bottom: 1px solid var(--slate-100); }
        .card-list { display: flex; flex-direction: column; gap: 10px; }
        .card { background: #fff; border: 1px solid var(--slate-100); border-radius: 16px; padding: 24px 30px; display: grid; grid-template-columns: 60px 1fr 120px 100px; align-items: center; cursor: pointer; transition: 0.2s ease; }
        .card:hover:not(.inactive) { background: var(--slate-50); border-color: var(--navy); transform: scale(1.01); }
        .card.inactive { opacity: 0.4; filter: grayscale(1); border-style: dashed; cursor: default; }
        
        .rank { font-size: 20px; font-weight: 800; color: var(--slate-200); }
        .rank-1 { color: var(--gold) !important; font-size: 32px !important; }
        
        .pair-name { font-size: 18px; font-weight: 700; color: var(--navy); }
        .trend-up { color: var(--up); font-weight: 800; margin-left: 8px; }
        .trend-down { color: var(--down); font-weight: 800; margin-left: 8px; }
        .quota-msg { font-size: 10px; font-weight: 800; color: var(--slate-400); text-transform: uppercase; margin-top: 4px; }
        
        .elo-val { font-size: 24px; font-weight: 900; color: var(--navy); text-align: right; }
        .peak-val { font-size: 14px; font-weight: 600; color: var(--slate-400); text-align: right; }

        /* Side Panel */
        .overlay { position: fixed; inset: 0; background: rgba(0,45,114,0.05); backdrop-filter: blur(10px); display: none; z-index: 90; }
        #sidePanel { position: fixed; top: 0; right: -600px; width: 550px; height: 100%; background: white; z-index: 100; padding: 60px; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: -30px 0 90px rgba(0,0,0,0.1); }
        #sidePanel.open { right: 0; }
        .chart-container { background: var(--slate-50); border-radius: 24px; height: 320px; margin: 40px 0; padding: 20px; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closePanel()"></div>

    <div id="sidePanel">
        <button onclick="closePanel()" style="background:none; border:none; color:var(--slate-400); font-weight:800; cursor:pointer; margin-bottom:40px; letter-spacing:2px;">← RETURN</button>
        <h3 id="sideName" style="font-size:38px; font-weight:800; color:var(--navy); line-height:1;">Partnership</h3>
        <div class="chart-container"><canvas id="sideChart"></canvas></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="background:var(--slate-50); padding:30px; border-radius:20px;">
                <label style="font-size:10px; font-weight:800; color:var(--slate-400); display:block; margin-bottom:8px;">PERSONAL BEST</label>
                <div id="sidePB" style="font-size:32px; font-weight:900; color:var(--navy);">0.0</div>
                <div id="sidePBDate" style="font-size:11px; font-weight:600; color:var(--slate-400); margin-top:4px;">Date</div>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="branding">
                <span class="club-tag">Honors Bridge Club</span>
                <h1>Honors <span>Rankings</span></h1>
            </div>
            <div class="nav">
                <button class="nav-btn active" onclick="setView('2026', this)">2026 Season</button>
                <button class="nav-btn" onclick="setView('2025', this)">2025</button>
                <button class="nav-btn" onclick="setView('2024', this)">2024</button>
                <button class="nav-btn" onclick="setView('overall', this)">Cumulative</button>
            </div>
        </header>

        <div class="club-stats">
            <div class="stat-card"><label>Club All-Time High</label><div id="recScore" class="val">--</div><div id="recPair" class="sub">--</div></div>
            <div class="stat-card"><label>Most Active Duo</label><div id="actGames" class="val">--</div><div id="actPair" class="sub">--</div></div>
        </div>

        <div class="main-layout">
            <div class="list-header"><div>Rank</div><div>Partnership</div><div style="text-align: right;">TrueSkill</div><div style="text-align: right;">Peak</div></div>
            <div id="cardContainer" class="card-list"></div>
        </div>
    </div>

    <script>
        let fullData = null; let activeChart = null;

        async function init() {
            try {
                const res = await fetch('./data.json');
                const json = await res.json();
                fullData = json.data;
                document.getElementById('recScore').textContent = json.records.allTimeHigh.score;
                document.getElementById('recPair').textContent = json.records.allTimeHigh.pair;
                document.getElementById('actGames').textContent = json.records.mostActive.games + " Games";
                document.getElementById('actPair').textContent = json.records.mostActive.pair;
                setView('2026', document.querySelector('.nav-btn.active'));
            } catch (e) { console.error("Load failed", e); }
        }

        function getTrend(history, currentScore) {
            if (!history || history.length < 3) return '';
            const lastThree = history.slice(-4, -1);
            const avg = lastThree.reduce((a, b) => a + b.m, 0) / lastThree.length;
            if (currentScore > avg + 0.2) return '<span class="trend-up">▲</span>';
            if (currentScore < avg - 0.2) return '<span class="trend-down">▼</span>';
            return '';
        }

        function setView(view, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            const sorted = fullData[view].sort((a,b) => b.active - a.active || b.score - a.score);

            sorted.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = `card ${item.active ? '' : 'inactive'}`;
                if(item.active) card.onclick = () => openPanel(item);
                
                let rank = item.active ? (i + 1) : '•';
                if(item.active && i === 0) rank = '🥇';

                card.innerHTML = `
                    <div class="rank ${item.active && i === 0 ? 'rank-1' : ''}">${rank}</div>
                    <div>
                        <div class="pair-name">${item.pair}${item.active ? getTrend(item.history, item.score) : ''}</div>
                        ${item.active ? '' : `<div class="quota-msg">Progress: ${item.p_gms}/${item.p_quota} Games</div>`}
                    </div>
                    <div class="elo-val">${item.score.toFixed(1)}</div>
                    <div class="peak-val">${item.pb ? item.pb.toFixed(1) : '--'}</div>
                `;
                container.appendChild(card);
            });
        }

        function openPanel(item) {
            document.getElementById('sideName').textContent = item.pair;
            document.getElementById('sidePB').textContent = item.pb ? item.pb.toFixed(1) : '--';
            document.getElementById('sidePBDate').textContent = "Set on: " + (item.pb_date || 'N/A');
            document.getElementById('sidePanel').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
            const ctx = document.getElementById('sideChart').getContext('2d');
            if(activeChart) activeChart.destroy();
            activeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: item.history.map(h => h.d),
                    datasets: [{ data: item.history.map(h => h.m), borderColor: '#002d72', borderWidth: 4, pointRadius: 0, tension: 0.3, fill: true, backgroundColor: 'rgba(0,45,114,0.02)' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#f1f5f9' } } } }
            });
        }

        function closePanel() { document.getElementById('sidePanel').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; }
        init();
    </script>
</body>
</html>
