<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Intelligence | Honors</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Public Sans', sans-serif; 
            background: #FFF; 
            color: #111; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
        }

        /* Fixed Sidebar Controller */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 200px;
            background: #001E3C;
            padding: 40px 20px;
            color: white;
            z-index: 100;
        }

        .sidebar-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15rem; color: #8BA8C7; margin-bottom: 10px; }

        select { 
            width: 100%;
            background: transparent;
            color: white;
            border: 1px solid #2D4A6B;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1rem;
        }

        /* Center Content Container */
        .container { 
            max-width: 1200px; 
            width: 80%; 
            padding: 80px 0; 
            margin-left: 240px; /* Offset for sidebar */
        }

        /* Hero Typography */
        .hero { margin-bottom: 80px; }
        #display-year { font-size: 8rem; font-weight: 700; color: #001E3C; letter-spacing: -0.4rem; line-height: 0.8; margin: 0; }
        .hero-sub { font-size: 1.1rem; color: #00558C; text-transform: uppercase; letter-spacing: 0.4rem; font-weight: 600; margin-top: 15px; }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .section-title { 
            font-weight: 700; font-size: 0.85rem; text-transform: uppercase; 
            letter-spacing: 0.2rem; color: #00558C; 
            border-bottom: 2px solid #F4F7F9; padding-bottom: 15px; margin-bottom: 25px; 
        }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { text-align: left; font-size: 0.65rem; color: #A5AAB0; text-transform: uppercase; padding: 10px 0; border-bottom: 1px solid #EEE; letter-spacing: 0.05rem; }
        td { padding: 18px 0; font-size: 1rem; border-bottom: 1px solid #F9FAFB; }
        
        .rank { width: 45px; font-weight: 700; color: #00558C; }
        .name-col { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .val { text-align: right; font-weight: 700; color: #001E3C; width: 80px; }
        .sessions { text-align: right; color: #8E959E; font-variant-numeric: tabular-nums; width: 80px; }
        
        .proven-badge {
            font-size: 0.6rem; background-color: #E8F0FE; color: #00558C;
            padding: 3px 6px; border-radius: 4px; margin-left: 10px;
            font-weight: 600; vertical-align: middle;
        }

        /* Animation */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-label">Timescale</div>
        <select id="year-select" onchange="updateDashboard()">
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
            <option value="2019">2019</option>
        </select>
    </div>

    <div class="container">
        <div class="hero">
            <h1 id="display-year">2026</h1>
            <div class="hero-sub">Performance Analysis</div>
        </div>

        <div class="grid">
            <div class="ledger">
                <div class="section-title">Top 20 Individuals</div>
                <table id="player-table">
                    <thead><tr><th class="rank">#</th><th>Player</th><th style="text-align:right">Rating</th><th style="text-align:right">Sess</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="ledger">
                <div class="section-title">Top 20 Partnerships</div>
                <table id="pair-table">
                    <thead><tr><th class="rank">#</th><th>Partnership</th><th style="text-align:right">Score</th><th style="text-align:right">Sess</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let masterData = {};
    let currentPlayers = [];

    async function init() {
        try {
            // Added a timestamp to the URL to bypass browser caching
            const response = await fetch('data.json?v=' + Date.now());
            masterData = await response.json();
            
            const selector = document.getElementById('year-select');
            selector.innerHTML = ''; // Clear existing options

            // 1. Separate "All-Time" from the numeric years for clean sorting
            const keys = Object.keys(masterData);
            const years = keys.filter(k => k !== "All-Time").sort((a, b) => b - a);
            
            // 2. Add "All-Time" to the top of the dropdown
            if (keys.includes("All-Time")) {
                const opt = document.createElement('option');
                opt.value = "All-Time";
                opt.innerHTML = "🏆 All-Time Masters";
                selector.appendChild(opt);
            }

            // 3. Add the discovered years (including 2018)
            years.forEach(year => {
                const opt = document.createElement('option');
                opt.value = year;
                opt.innerHTML = `Year: ${year}`;
                selector.appendChild(opt);
                console.log("Loaded year into dropdown:", year); // Debug log
            });

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            
            // Default to the highest year (usually 2026)
            selector.value = years[0];
            updateDashboard();

        } catch (e) {
            console.error(e);
            document.getElementById('loader').innerHTML = "❌ Error: Could not find 2018 in data.json. Check file content.";
        }
    }
    </script>
</body>
</html>
