<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bridge Registry</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --muted: #717171;
            --line: #e5e5e5;
            --accent: #2d3436;
        }

        body {
            font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 60px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 800px; margin: auto; }

        header { 
            border-bottom: 1px solid var(--text); 
            margin-bottom: 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: baseline;
            padding-bottom: 8px;
        }

        h1 { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin: 0; }
        .date-stamp { font-size: 0.8rem; color: var(--muted); }

        /* Navigation */
        .nav { display: flex; gap: 24px; margin-bottom: 40px; }
        .nav-link {
            font-size: 0.85rem;
            color: var(--muted);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
            font-weight: 500;
        }
        .nav-link:hover { color: var(--text); }
        .nav-link.active { color: var(--text); text-decoration: underline; text-underline-offset: 6px; }

        /* Performance View */
        .visual-area { height: 160px; margin-bottom: 50px; border-bottom: 1px solid var(--line); }

        /* Table Style */
        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            color: var(--muted); 
            padding: 12px 8px;
            border-bottom: 1px solid var(--line);
        }
        td { padding: 16px 8px; font-size: 0.9rem; border-bottom: 1px dotted var(--line); }
        tr:hover td { background-color: #fcfcfc; cursor: crosshair; }

        .mono { font-family: "SF Mono", "Roboto Mono", monospace; font-size: 0.85rem; }
        .rank-num { width: 30px; color: var(--line); font-weight: 700; }
        
        #error-msg { 
            display: none; 
            font-size: 0.8rem; 
            color: #d63031; 
            border: 1px solid #d63031; 
            padding: 12px; 
            margin-bottom: 20px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div id="error-msg">ENTRY DATA NOT FOUND. Verify 'data.json' is present in the root directory.</div>

    <header>
        <h1>Partnership Performance Registry</h1>
        <span class="date-stamp">REF: 2024—2026</span>
    </header>

    <div class="nav" id="navBar">
        <span class="nav-link active" onclick="setView('2026', this)">2026</span>
        <span class="nav-link" onclick="setView('2025', this)">2025</span>
        <span class="nav-link" onclick="setView('2024', this)">2024</span>
        <span class="nav-link" onclick="setView('overall', this)">Cumulative</span>
    </div>

    <div class="visual-area">
        <canvas id="mainChart"></canvas>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th class="rank-num"></th>
                <th>Partnership</th>
                <th style="text-align: right;">Rating</th>
                <th style="text-align: right;">Peak</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let db = null;
    let chart = null;

    async function start() {
        try {
            // Updated to fetch from root directly
            const res = await fetch('./data.json');
            if (!res.ok) throw new Error();
            db = await res.json();
            setView('2026', document.querySelector('.nav-link.active'));
        } catch (e) {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function setView(year, element) {
        if (!db) return;
        
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        element.classList.add('active');

        const entries = db[year] || [];
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        entries.forEach((row, i) => {
            const tr = document.createElement('tr');
            tr.onclick = () => updatePlot(row.pair, row.history);
            tr.innerHTML = `
                <td class="rank-num">${i + 1}</td>
                <td>${row.pair}</td>
                <td class="mono" style="text-align: right;">${row.score.toFixed(2)}</td>
                <td class="mono" style="text-align: right; color: #b2bec3;">${row.peak ? row.peak.toFixed(2) : '--'}</td>
            `;
            tbody.appendChild(tr);
        });

        if (entries.length > 0) updatePlot(entries[0].pair, entries[0].history);
    }

    function updatePlot(label, points) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: points.map(p => p.d),
                datasets: [{
                    data: points.map(p => p.m),
                    borderColor: '#2d3436',
                    borderWidth: 1,
                    pointRadius: 0,
                    tension: 0.1,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: true } },
                scales: {
                    x: { display: false },
                    y: { 
                        grid: { borderDash: [5, 5], color: '#f0f0f0' },
                        ticks: { color: '#b2bec3', font: { size: 9 } }
                    }
                }
            }
        });
    }

    start();
</script>

</body>
</html>
