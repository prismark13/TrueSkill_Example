<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Rankings | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfcfd; color: #111827; }
        h1 { font-family: 'Instrument Serif', serif; }
        .navy { color: #002d72; }
        .glass-card { background: white; border: 1px solid #f3f4f6; border-radius: 20px; transition: all 0.3s ease; cursor: pointer; }
        .glass-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.08); border-color: #002d72; }
        .sof-badge { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; }
        .Elite { background: #fee2e2; color: #991b1b; }
        .Competitive { background: #dbeafe; color: #1e40af; }
        .Club { background: #f1f5f9; color: #475569; }
        #sidePanel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 480px; height: 100%; background: white; box-shadow: -20px 0 60px rgba(0,0,0,0.1); transition: 0.5s ease; z-index: 100; }
        #sidePanel.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(4px); display: none; z-index: 90; }
    </style>
</head>
<body class="p-6 lg:p-16">
    <div class="overlay" id="overlay" onclick="closePanel()"></div>

    <div id="sidePanel" class="p-10 flex flex-col">
        <button onclick="closePanel()" class="mb-10 text-[10px] font-bold uppercase tracking-widest text-gray-400">← Back to List</button>
        <h2 id="sideName" class="text-4xl font-bold navy mb-2 leading-tight">Name</h2>
        <div id="sideSof" class="sof-badge inline-block w-max mb-8">Club</div>
        <div class="bg-gray-50 rounded-[32px] p-6 h-64 mb-8"><canvas id="sideChart"></canvas></div>
        <div class="grid grid-cols-2 gap-4">
            <div class="p-6 bg-blue-50 rounded-2xl"><span class="block text-[10px] font-bold text-blue-400 uppercase mb-1">Career Avg</span><span id="sideAvg" class="text-3xl font-black navy">0%</span></div>
            <div class="p-6 bg-gray-50 rounded-2xl"><span class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Sessions</span><span id="sideCount" class="text-3xl font-black text-gray-700">0</span></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-20 gap-8">
            <div>
                <div class="text-[10px] font-bold uppercase tracking-[0.3em] text-blue-600 mb-2">Honors Bridge Club</div>
                <h1 class="text-7xl navy leading-none">Bridge <span class="italic font-light text-gray-300">Rankings</span></h1>
            </div>
            <div class="flex gap-4">
                <input type="text" id="search" placeholder="Search name..." class="bg-white border border-gray-200 px-4 py-2 rounded-xl text-sm outline-none focus:border-blue-900">
                <select id="year" class="bg-white border border-gray-200 px-4 py-2 rounded-xl text-sm font-bold text-blue-900 outline-none"></select>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            <section>
                <h2 class="text-2xl font-bold mb-8">Top Partnerships</h2>
                <div id="pairs" class="space-y-4"></div>
            </section>
            <section>
                <h2 class="text-2xl font-bold mb-8">Top Players</h2>
                <div id="players" class="space-y-4"></div>
            </section>
        </div>
    </div>

    <script>
        let data = []; let chart = null;
        async function init() {
            const res = await fetch('data.json'); data = await res.json();
            const yrs = [...new Set(data.map(d => d.year))].sort().reverse();
            yrs.forEach(y => { if(y) document.getElementById('year').add(new Option(y, y)); });
            document.getElementById('search').addEventListener('input', render);
            document.getElementById('year').addEventListener('change', render);
            render();
        }

        function getMedal(i) { return i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1).toString().padStart(2, '0'); }

        function render() {
            const s = document.getElementById('search').value.toLowerCase();
            const y = document.getElementById('year').value;
            let filtered = data.filter(d => d.year === y);
            if(s) filtered = filtered.filter(d => d.p1.toLowerCase().includes(s) || d.p2.toLowerCase().includes(s));

            const pairMap = {};
            filtered.forEach(d => {
                const k = `${d.p1} & ${d.p2}`;
                if(!pairMap[k]) pairMap[k] = { name: k, sum: 0, count: 0, mu: d.mu, sof: d.sof, games: [] };
                pairMap[k].sum += (d.pct * d.weight); pairMap[k].count++; pairMap[k].games.push(d.pct);
            });
            const sortedPairs = Object.values(pairMap).filter(p => p.count >= 2).sort((a,b) => b.mu - a.mu).slice(0, 15);

            const playerMap = {};
            filtered.forEach(d => { [d.p1, d.p2].forEach(p => {
                if(!playerMap[p]) playerMap[p] = { name: p, sum: 0, count: 0, sof: d.sof, games: [] };
                playerMap[p].sum += (d.pct * d.weight); playerMap[p].count++; playerMap[p].games.push(d.pct);
            })});
            const sortedInd = Object.values(playerMap).filter(p => p.count >= 3).sort((a,b) => (b.sum/b.count) - (a.sum/a.count)).slice(0, 15);

            document.getElementById('pairs').innerHTML = sortedPairs.map((p, i) => `
                <div class="glass-card flex justify-between items-center p-6" onclick="openPanel('${p.name}', ${JSON.stringify(p.games)}, '${(p.sum/p.count).toFixed(1)}', ${p.count}, '${p.sof}')">
                    <div class="flex items-center gap-4">
                        <span class="text-xl font-bold ${i < 3 ? 'text-3xl' : 'text-gray-200'} w-8 text-center">${getMedal(i)}</span>
                        <div><p class="font-bold text-slate-800">${p.name}</p>
                        <div class="flex items-center gap-2 mt-1"><span class="sof-badge ${p.sof}">${p.sof} Field</span> <span class="text-[9px] text-gray-400 font-bold uppercase">${p.count} Games</span></div></div>
                    </div>
                    <div class="text-xl font-black navy">${(p.sum/p.count).toFixed(1)}%</div>
                </div>
            `).join('');

            document.getElementById('players').innerHTML = sortedInd.map((p, i) => `
                <div class="glass-card flex justify-between items-center p-6" onclick="openPanel('${p.name}', ${JSON.stringify(p.games)}, '${(p.sum/p.count).toFixed(1)}', ${p.count}, '${p.sof}')">
                    <div class="flex items-center gap-4">
                        <span class="text-xl font-bold ${i < 3 ? 'text-3xl' : 'text-gray-200'} w-8 text-center">${getMedal(i)}</span>
                        <p class="font-bold text-slate-700">${p.name}</p>
                    </div>
                    <div class="text-xl font-extrabold text-slate-900">${(p.sum/p.count).toFixed(1)}%</div>
                </div>
            `).join('');
        }

        function openPanel(name, scores, avg, count, sof) {
            document.getElementById('sideName').textContent = name;
            document.getElementById('sideAvg').textContent = avg + '%';
            document.getElementById('sideCount').textContent = count;
            document.getElementById('sideSof').textContent = sof + " Field";
            document.getElementById('sideSof').className = `sof-badge ${sof}`;
            document.getElementById('sidePanel').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
            const ctx = document.getElementById('sideChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'line', data: { labels: scores.map((_, i) => i+1), datasets: [{ data: scores, borderColor: '#002d72', backgroundColor: 'rgba(0,45,114,0.05)', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { min: 40, max: 75 } } } });
        }
        function closePanel() { document.getElementById('sidePanel').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; }
        init();
    </script>
</body>
</html>
