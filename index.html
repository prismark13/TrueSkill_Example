<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge ELO - Shark Tank Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --accent: #00e5ff;
            --shark-red: #ff3d00;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: auto; }

        h1 { text-align: center; color: var(--accent); letter-spacing: 2px; }

        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            background: var(--card);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent); color: var(--bg); font-weight: bold; }

        /* Chart Area */
        #chartContainer {
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            height: 300px;
            border: 1px solid #333;
        }

        /* Leaderboard Table */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th { background: #2a2a2a; color: var(--accent); padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #333; cursor: pointer; }
        tr:hover { background: #252525; }

        .rank { font-weight: bold; color: #888; width: 40px; }
        .pair-name { font-weight: 500; color: #fff; }
        .score { color: var(--accent); font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        .peak { font-size: 0.8em; color: #666; }
        
        .badge {
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 10px;
            text-transform: uppercase;
        }
        .badge-elite { background: var(--shark-red); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>SHARK TANK ELO</h1>

    <div class="tabs" id="tabGroup">
        <button class="tab-btn active" onclick="loadView('2026')">2026 Season</button>
        <button class="tab-btn" onclick="loadView('2025')">2025</button>
        <button class="tab-btn" onclick="loadView('2024')">2024</button>
        <button class="tab-btn" onclick="loadView('overall')">Lifetime</button>
    </div>

    <div id="chartContainer">
        <canvas id="eloChart"></canvas>
    </div>

    <table id="leaderboard">
        <thead>
            <tr>
                <th class="rank">#</th>
                <th>Partnership</th>
                <th>ELO Score</th>
                <th>Peak</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="leaderboardBody">
            </tbody>
    </table>
</div>

<script>
    let globalData = {};
    let currentChart = null;

    // 1. Fetch the data.json we just exported
    fetch('data/data.json')
        .then(response => response.json())
        .then(data => {
            globalData = data;
            loadView('2026'); // Default view
        });

    function loadView(viewKey) {
        // Update Tab UI
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        const list = globalData[viewKey];
        const body = document.getElementById('leaderboardBody');
        body.innerHTML = '';

        list.forEach((entry, index) => {
            const isElite = entry.mu > 30;
            const row = document.createElement('tr');
            row.onclick = () => updateChart(entry.pair, entry.history);
            
            row.innerHTML = `
                <td class="rank">${index + 1}</td>
                <td class="pair-name">${entry.pair}</td>
                <td class="score">${entry.score.toFixed(2)}</td>
                <td class="peak">${entry.peak || '--'}</td>
                <td>${isElite ? '<span class="badge badge-elite">Shark</span>' : ''}</td>
            `;
            body.appendChild(row);
        });

        // Load the top pair into the chart by default
        if (list.length > 0) updateChart(list[0].pair, list[0].history);
    }

    function updateChart(name, history) {
        const ctx = document.getElementById('eloChart').getContext('2d');
        
        if (currentChart) currentChart.destroy();

        if (!history || history.length === 0) {
            ctx.fillText("No history data available for this pair.", 10, 50);
            return;
        }

        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: history.map(h => h.d), // Dates
                datasets: [{
                    label: `Rating Trend: ${name}`,
                    data: history.map(h => h.m), // Mu values
                    borderColor: '#00e5ff',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(0, 229, 255, 0.1)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: false },
                    y: { grid: { color: '#333' }, ticks: { color: '#888' } }
                },
                plugins: {
                    legend: { labels: { color: '#fff' } }
                }
            }
        });
    }
</script>

</body>
</html>
