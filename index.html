<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Rankings | TrueSkill Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #002d72;
            --slate-50: #f8fafc;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --blue-bg: #eff6ff;
            --blue-text: #1e40af;
            --elite-bg: #fee2e2;
            --elite-text: #991b1b;
            --trend-up: #059669;
            --trend-down: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfcfd; color: #1e293b; padding: 40px; }
        
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 60px; border-bottom: 1px solid var(--slate-200); padding-bottom: 30px; }
        .branding h1 { font-family: 'Instrument Serif', serif; font-size: 80px; color: var(--navy); line-height: 0.9; }
        .branding h1 span { font-style: italic; font-weight: 300; color: var(--slate-200); }
        .club-tag { font-size: 10px; font-weight: 800; letter-spacing: 4px; color: var(--blue-text); text-transform: uppercase; margin-bottom: 15px; display: block; }
        
        .controls { display: flex; gap: 15px; }
        .search-box, .year-select { padding: 12px 20px; border-radius: 12px; border: 1px solid var(--slate-200); font-family: inherit; font-weight: 600; color: var(--navy); outline: none; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        h2 { font-size: 28px; font-weight: 800; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: baseline; }
        h2 small { font-size: 10px; color: var(--slate-400); text-transform: uppercase; letter-spacing: 2px; }

        .card-list { display: flex; flex-direction: column; gap: 20px; }
        .card { 
            background: white; border: 1px solid #f1f5f9; border-radius: 20px; padding: 25px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--navy); box-shadow: 0 20px 30px -10px rgba(0,0,0,0.08); }
        
        .card-left { display: flex; align-items: center; gap: 20px; }
        .rank { width: 40px; text-align: center; font-size: 24px; font-weight: 800; color: var(--slate-200); }
        .rank.medal { font-size: 32px; }
        
        .info .name { font-size: 18px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
        .badge { font-size: 9px; font-weight: 800; padding: 3px 10px; border-radius: 6px; text-transform: uppercase; }
        .badge.Elite { background: var(--elite-bg); color: var(--elite-text); }
        .badge.Club { background: var(--slate-50); color: var(--slate-400); }
        .session-count { font-size: 10px; color: var(--slate-400); font-weight: 700; margin-left: 8px; }

        .metric-group { text-align: right; }
        .ts-hero { font-size: 28px; font-weight: 900; color: var(--navy); line-height: 1; }
        .avg-sub { font-size: 11px; font-weight: 700; color: var(--slate-400); margin-top: 4px; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
        
        .trend-icon.up { color: var(--trend-up); }
        .trend-icon.down { color: var(--trend-down); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.15); backdrop-filter: blur(8px); display: none; z-index: 90; }
        #sidePanel { 
            position: fixed; top: 0; right: -500px; width: 480px; height: 100%; 
            background: white; box-shadow: -20px 0 60px rgba(0,0,0,0.1); 
            transition: 0.5s ease; z-index: 100; padding: 50px; display: flex; flex-direction: column;
        }
        #sidePanel.open { right: 0; }
        .close-btn { background: none; border: none; color: var(--slate-400); font-weight: 800; text-transform: uppercase; font-size: 10px; cursor: pointer; margin-bottom: 40px; text-align: left; }
        
        .chart-container { background: var(--slate-50); border-radius: 30px; padding: 20px; height: 300px; margin: 30px 0; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-box { background: var(--blue-bg); border-radius: 20px; padding: 25px; }
        .stat-box.alt { background: var(--slate-50); }
        .stat-box label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #60a5fa; margin-bottom: 5px; }
        .stat-box .val { font-size: 32px; font-weight: 900; color: var(--navy); }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closePanel()"></div>

    <div id="sidePanel">
        <button class="close-btn" onclick="closePanel()">← Back to Rankings</button>
        <h3 id="sideName" style="font-size: 32px; font-weight: 800; color: var(--navy);">Name</h3>
        <p id="sideSoS" style="font-size: 11px; font-weight: 800; color: var(--blue-text); text-transform: uppercase; margin-top: 10px;">Schedule: Elite Field</p>
        
        <div class="chart-container">
            <canvas id="performanceChart"></canvas>
        </div>

        <div class="stat-grid">
            <div class="stat-box">
                <label>Skill Rating (Mu)</label>
                <span class="val" id="sideTS">0.0</span>
            </div>
            <div class="stat-box alt">
                <label>Unweighted Avg</label>
                <span class="val" id="sideAvg">0%</span>
            </div>
        </div>
    </div>

    <header>
        <div class="branding">
            <span class="club-tag">Honors Bridge Club</span>
            <h1>Bridge <span>Rankings</span></h1>
        </div>
        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Filter names...">
            <select id="yearSelect" class="year-select"></select>
        </div>
    </header>

    <div class="dashboard-grid">
        <section>
            <h2>Partnerships <small>Ranked by TrueSkill</small></h2>
            <div id="pairList" class="card-list"></div>
        </section>

        <section>
            <h2>Individuals <small>Ranked by TrueSkill</small></h2>
            <div id="playerList" class="card-list"></div>
        </section>
    </div>

    <script>
        let bridgeData = [];
        let activeChart = null;

        async function init() {
            try {
                const res = await fetch('data.json');
                bridgeData = await res.json();
                
                const years = [...new Set(bridgeData.map(d => d.year))].sort().reverse();
                const select = document.getElementById('yearSelect');
                years.forEach(y => { if(y) select.add(new Option(y, y)); });

                document.getElementById('searchInput').addEventListener('input', render);
                document.getElementById('yearSelect').addEventListener('change', render);

                render();
            } catch (err) { console.error("Data error", err); }
        }

        function getRank(i) {
            if (i === 0) return '🥇';
            if (i === 1) return '🥈';
            if (i === 2) return '🥉';
            return i + 1;
        }

        function getTrend(history, currentAvg) {
            if (!history || history.length < 2) return '';
            const lastGame = history[history.length - 1];
            return lastGame > currentAvg 
                ? '<span class="trend-icon up">↑</span>' 
                : '<span class="trend-icon down">↓</span>';
        }

        function render() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const year = document.getElementById('yearSelect').value;
            let filtered = bridgeData.filter(d => d.year === year);
            
            if(search) filtered = filtered.filter(d => d.p1.toLowerCase().includes(search) || d.p2.toLowerCase().includes(search));

            const pairs = {};
            filtered.forEach(d => {
                const k = `${d.p1} & ${d.p2}`;
                if(!pairs[k]) pairs[k] = { name: k, rawSum: 0, count: 0, mu: d.mu, sof: d.sof, games: [] };
                pairs[k].rawSum += d.pct;
                pairs[k].count++;
                pairs[k].games.push(d.pct);
            });
            
            const sortedPairs = Object.values(pairs)
                .filter(p => p.count >= 2)
                .sort((a,b) => b.mu - a.mu)
                .slice(0, 20);

            const players = {};
            filtered.forEach(d => {
                [d.p1, d.p2].forEach(p => {
                    if(!players[p]) players[p] = { name: p, rawSum: 0, count: 0, mu: d.mu, sof: d.sof, games: [] };
                    players[p].rawSum += d.pct;
                    players[p].count++;
                    players[p].games.push(d.pct);
                    if(d.mu > players[p].mu) players[p].mu = d.mu;
                });
            });

            const sortedPlayers = Object.values(players)
                .filter(p => p.count >= 3)
                .sort((a,b) => b.mu - a.mu)
                .slice(0, 20);

            document.getElementById('pairList').innerHTML = sortedPairs.map((p, i) => {
                const avg = (p.rawSum/p.count);
                return `
                <div class="card" onclick="openPanel('${p.name}', ${JSON.stringify(p.games)}, '${avg.toFixed(1)}', '${p.mu.toFixed(2)}', '${p.sof}')">
                    <div class="card-left">
                        <div class="rank ${i < 3 ? 'medal' : ''}">${getRank(i)}</div>
                        <div class="info">
                            <div class="name">${p.name}</div>
                            <div class="meta">
                                <span class="badge ${p.sof}">${p.sof} FIELD</span>
                                <span class="session-count">${p.count} GAMES</span>
                            </div>
                        </div>
                    </div>
                    <div class="metric-group">
                        <div class="ts-hero">${p.mu.toFixed(1)}</div>
                        <div class="avg-sub">
                            ${getTrend(p.games, avg)} ${avg.toFixed(1)}% Avg
                        </div>
                    </div>
                </div>
            `}).join('');

            document.getElementById('playerList').innerHTML = sortedPlayers.map((p, i) => {
                const avg = (p.rawSum/p.count);
                return `
                <div class="card" onclick="openPanel('${p.name}', ${JSON.stringify(p.games)}, '${avg.toFixed(1)}', '${p.mu.toFixed(2)}', '${p.sof}')">
                    <div class="card-left">
                        <div class="rank ${i < 3 ? 'medal' : ''}">${getRank(i)}</div>
                        <div class="info">
                            <div class="name">${p.name}</div>
                            <div class="meta">
                                <span class="session-count">${p.count} GAMES</span>
                            </div>
                        </div>
                    </div>
                    <div class="metric-group">
                        <div class="ts-hero">${p.mu.toFixed(1)}</div>
                        <div class="avg-sub">
                             ${getTrend(p.games, avg)} ${avg.toFixed(1)}% Avg
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function openPanel(name, scores, avg, mu, sof) {
            document.getElementById('sideName').textContent = name;
            document.getElementById('sideAvg').textContent = avg + '%';
            document.getElementById('sideTS').textContent = mu;
            document.getElementById('sideSoS').textContent = "Schedule: " + (sof || "Club");
            document.getElementById('sidePanel').classList.add('open');
            document.getElementById('overlay').style.display = 'block';

            const ctx = document.getElementById('performanceChart').getContext('2d');
            if(activeChart) activeChart.destroy();
            activeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: scores.map((_, i) => i+1),
                    datasets: [{ data: scores, borderColor: '#002d72', backgroundColor: 'rgba(0,45,114,0.06)', fill: true, tension: 0.4, borderWidth: 4 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { min: 35, max: 80 } }
                }
            });
        }

        function closePanel() {
            document.getElementById('sidePanel').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
